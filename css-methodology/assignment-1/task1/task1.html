<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment 13</title>
    <link href='https://fonts.googleapis.com/css?family=Open Sans' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-card__left">

            <div class="profile-card__avatar">
                <img src="../images/pfp.png" alt="profile">
            </div>

            <h2 class="profile-card__name">Jessica Potter</h2>
            <p class="profile-card__role">Visual Artist</p>

            <div class="profile-card__buttons">
                <div class="btn btn--light">Follow</div>
                <div class="btn btn--dark">Message</div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="profile-card__right">

            <div class="info info--light">
                <div class="info__number">523</div>
                <div class="info__label">Posts</div>
            </div>

            <div class="info info--dark">
                <div class="info__number">1387</div>
                <div class="info__label">Likes</div>
            </div>

            <div class="info info--light">
                <div class="info__number">146</div>
                <div class="info__label">Follower</div>
            </div>

        </div>

    </div>

</body>

</html>
