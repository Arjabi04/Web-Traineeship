<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment 13</title>
    <link href='https://fonts.googleapis.com/css?family=Open Sans' rel='stylesheet'>

    <style>
        body {

            font-family: 'Open Sans';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(to right, #E8D06F, #C8802C);

        }

        .card {
            width: 50%;
            height: 80%;
            display: flex;
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .left {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #8a7868;
            margin: 0 auto 15px;
            overflow: hidden;
            transition: 0.7s;
        }

        .avatar:hover {
            border: 4px solid #8a7868;

        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            margin: 10px 0 5px 0;
            color: #7C6957;
        }

        p {
            margin: 0;
            color: #9a8a7a;
        }

        .buttons {
            margin-top: 35px;
        }

        .btn {
            display: block;
            width: 160px;
            margin: 12px auto;
            padding: 10px 0;
            border-radius: 30px;
            border: 2px solid #7C6957;
            color: #7C6957;
            transition: 0.3s;
            text-align: center;
            font-weight: 900;
        }

        .btn:hover {
            background: #7C6957;
            color: white;
        }

        /* right sidebar */
        .right {
            flex: 1;
            background: #F5E8DF;
            display: flex;
            flex-direction: column;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid #ffffff;
            transition: 0.3s;
        }

        .sidebar:hover {
            background: #CBBFB6;
        }

        .sidebar:last-child {
            border-bottom: none;
        }

        .number {
            font-size: 32px;
            font-weight: bold;
            color: #7C6957;
        }

        .label {
            color: #8a7868;
            margin-top: 5px;
        }

        /* responsive */
        @media (max-width: 900px) {
            .card {
                flex-direction: column;
                width: auto;

            }

            .right {
                flex-direction: row;
            }

            .sidebar {
                padding: 24px;
                border-right: 2px solid #fff;
            }

            .sidebar:last-child {
                border-right: none;
            }
        }
    </style>
</head>

<body>
    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-card__left">

            <div class="profile-card__avatar">
                <img src="../images/pfp.png" alt="profile">
            </div>

            <h2 class="profile-card__name">Jessica Potter</h2>
            <p class="profile-card__role">Visual Artist</p>

            <div class="profile-card__buttons">
                <div class="btn">Follow</div>
                <div class="btn">Message</div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="profile-card__right">

            <div class="info">
                <div class="info__number">523</div>
                <div class="info__label">Posts</div>
            </div>

            <div class="info">
                <div class="info__number">1387</div>
                <div class="info__label">Likes</div>
            </div>

            <div class="info">
                <div class="info__number">146</div>
                <div class="info__label">Follower</div>
            </div>

        </div>

    </div>

</body>

</html>
