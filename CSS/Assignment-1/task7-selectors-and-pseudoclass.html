    <title>Task 7</title>
    <style>
        .chessboard {
            display: grid;
            /* Creates 8 columns of equal width */
            grid-template-columns: repeat(8, 50px);
            /* Creates 8 rows of equal height */
            grid-template-rows: repeat(8, 50px);
            border: 10px solid black;
            width: max-content;
            margin: 20px auto;
        }

        .square {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        /*  Colors */
        .white {
            background-color: #dddddd;
        }

        .black {
            background-color: #000000;
        }

        .square:hover {
            /* Changes color on hover */
            background-color: #3628af60;
        }


        .square.piece:hover {
            background-color: #3628af60;
        }

        .square:is(.piece) {
            background-color: white;
        }
    </style>
</head>
