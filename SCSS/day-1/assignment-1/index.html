<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-1 | Assignment-1</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <h1>Button Component System</h1>

    <!-- Primary -->
    <div class="section">
        <div class="section-label">Primary</div>
        <div class="btn-row">
            <button class="btn btn--primary btn--sm">Primary Small</button>
            <button class="btn btn--primary btn--md">Primary Medium</button>
            <button class="btn btn--primary btn--lg">Primary Large</button>
        </div>
    </div>

    <hr class="divider" />

    <!-- Danger -->
    <div class="section">
        <div class="section-label">Danger</div>
        <div class="btn-row">
            <button class="btn btn--danger btn--sm">Danger Small</button>
            <button class="btn btn--danger btn--md">Danger Medium</button>
            <button class="btn btn--danger btn--lg">Danger Large</button>
        </div>
    </div>

    <hr class="divider" />

    <!-- Ghost -->
    <div class="section">
        <div class="section-label">Ghost</div>
        <div class="btn-row">
            <button class="btn btn--ghost btn--sm">Ghost Small</button>
            <button class="btn btn--ghost btn--md">Ghost Medium</button>
            <button class="btn btn--ghost btn--lg">Ghost Large</button>
        </div>
    </div>

    <hr class="divider" />

    <!-- Disabled -->
    <div class="section">
        <div class="section-label">Disabled (via class)</div>
        <div class="btn-row">
            <button class="btn btn--primary btn--sm btn--disabled">Disabled Small</button>
            <button class="btn btn--danger  btn--md btn--disabled">Disabled Medium</button>
            <button class="btn btn--ghost   btn--lg btn--disabled">Disabled Large</button>
        </div>
    </div>

</body>

</html>
